<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国PVP - B站直播推流</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="frame83">
        <div class="frame3">
            <div class="scoreboard">
                <div class="scoreboard-side scoreboard-left">
                    <div class="player-name" id="leftPlayerName"></div>
                    <div class="player-score" id="leftPlayerScore"></div>
                </div>
                <div class="scoreboard-side scoreboard-right">
                    <div class="player-score" id="rightPlayerScore"></div>
                    <div class="player-name" id="rightPlayerName"></div>
                </div>
            </div>
            <div class="side-panel left-panel">
                <div class="sprite-slot" data-slot="0"></div>
                <div class="sprite-slot" data-slot="1"></div>
                <div class="sprite-slot" data-slot="2"></div>
                <div class="sprite-slot" data-slot="3"></div>
                <div class="sprite-slot" data-slot="4"></div>
                <div class="sprite-slot" data-slot="5"></div>
            </div>
            
            <div class="center-area">
            </div>
            
            <div class="side-panel right-panel">
                <div class="sprite-slot" data-slot="0"></div>
                <div class="sprite-slot" data-slot="1"></div>
                <div class="sprite-slot" data-slot="2"></div>
                <div class="sprite-slot" data-slot="3"></div>
                <div class="sprite-slot" data-slot="4"></div>
                <div class="sprite-slot" data-slot="5"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
