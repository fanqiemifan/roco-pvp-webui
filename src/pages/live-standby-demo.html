<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国PVP - 直播等待页</title>
    <link rel="stylesheet" href="/styles/live-standby-demo.css">
</head>
<body>
    <main class="standby-screen" aria-label="洛克王国PVP直播等待页">
        <div class="texture texture-left" aria-hidden="true"></div>
        <div class="texture texture-right" aria-hidden="true"></div>

        <header class="topbar">
            <div>
                <div class="eyebrow">ROCO PVP STANDBY</div>
                <h1>等待开始比赛</h1>
            </div>
            <div class="topbar-badge" id="topbarBadge">主舞台等待页</div>
        </header>

        <section class="content-layout">
            <article class="stage-card">
                <div class="card-label">主舞台</div>
                <h2>当前已选精灵</h2>
                <p class="card-desc" id="stageDescription">后台已经完成本局左右阵容选择，等待开始本次对局。</p>

                <div class="match-headline">
                    <div class="player-title">
                        <span class="player-side">LEFT</span>
                        <strong id="leftPlayerName">左侧选手</strong>
                    </div>
                    <div class="versus-center">
                        <div class="versus-score"><span id="leftPlayerScore">0</span><em>:</em><span id="rightPlayerScore">0</span></div>
                        <div class="versus-meta" id="versusMeta">BO3 · 第 1 局待开始</div>
                    </div>
                    <div class="player-title player-title-right">
                        <span class="player-side">RIGHT</span>
                        <strong id="rightPlayerName">右侧选手</strong>
                    </div>
                </div>

                <div class="lineup-showcase">
                    <section class="roster-card">
                        <div class="roster-title">左侧已选精灵</div>
                        <div class="roster-grid" id="leftRosterGrid"></div>
                    </section>

                    <section class="pending-state" aria-label="系列赛状态">
                        <div class="pending-chip" id="statusChip">MATCH PENDING</div>
                        <div class="pending-copy" id="statusText">等待开始本次对局</div>
                        <div class="game-track" id="gameTrack"></div>
                    </section>

                    <section class="roster-card roster-card-right">
                        <div class="roster-title">右侧已选精灵</div>
                        <div class="roster-grid" id="rightRosterGrid"></div>
                    </section>
                </div>

                <section class="recent-games-section">
                    <div class="recent-games-header">
                        <div class="roster-title">最近对局情况</div>
                        <div class="recent-games-note">最多展示最近 2 个已结束小局</div>
                    </div>
                    <div class="recent-games-list" id="recentGamesList"></div>
                </section>
            </article>

            <aside class="history-panel">
                <div class="section-header">
                    <div>
                        <div class="eyebrow">MATCH HISTORY</div>
                        <h2>历史对局结果</h2>
                    </div>
                    <div class="section-note" id="historyCountText">暂无已完赛记录</div>
                </div>
                <div class="history-list" id="historyList"></div>
            </aside>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/scripts/live-standby-demo.js"></script>
</body>
</html>
