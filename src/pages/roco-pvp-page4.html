<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国PVP - 推流页面4</title>
    <link rel="stylesheet" href="/styles/roco-pvp-page4.css">
</head>
<body>
    <main class="page4-screen" aria-label="洛克王国PVP推流页面4">
        <section class="lineup-all-div" aria-label="双方阵容展示">
            <div class="lineup-bg lineup-bg-left" aria-hidden="true"></div>
            <div class="lineup-outline" aria-hidden="true"></div>

            <section class="lineup lineup-left" aria-label="左侧阵容">
                <div class="petsdiv3" data-side="left" data-slot="0"></div>
                <div class="petsdiv3" data-side="left" data-slot="1"></div>
                <div class="petsdiv3" data-side="left" data-slot="2"></div>
                <div class="petsdiv3" data-side="left" data-slot="3"></div>
                <div class="petsdiv3" data-side="left" data-slot="4"></div>
                <div class="petsdiv3" data-side="left" data-slot="5"></div>
            </section>

            <section class="lineup lineup-right" aria-label="右侧阵容">
                <div class="petsdiv3" data-side="right" data-slot="0"></div>
                <div class="petsdiv3" data-side="right" data-slot="1"></div>
                <div class="petsdiv3" data-side="right" data-slot="2"></div>
                <div class="petsdiv3" data-side="right" data-slot="3"></div>
                <div class="petsdiv3" data-side="right" data-slot="4"></div>
                <div class="petsdiv3" data-side="right" data-slot="5"></div>
            </section>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/scripts/page4-display.js"></script>
</body>
</html>
