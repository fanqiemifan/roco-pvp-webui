<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国 PVP - 登录</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: rgba(255, 250, 243, 0.82);
            --panel-strong: #fff9f0;
            --line: rgba(91, 67, 43, 0.12);
            --text: #2f2418;
            --muted: #776554;
            --accent: #c7632f;
            --accent-deep: #8f4323;
            --danger: #c24635;
            --shadow: 0 24px 60px rgba(76, 47, 22, 0.12);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --font-display: "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif;
            --font-body: "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; }

        body {
            font-family: var(--font-body);
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(233, 171, 109, 0.35), transparent 32%),
                radial-gradient(circle at bottom right, rgba(150, 109, 67, 0.18), transparent 28%),
                linear-gradient(135deg, #efe4d4 0%, #f7f3ec 45%, #ebe0ce 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        button, input { font: inherit; }

        .login-card {
            width: min(420px, 100%);
            border-radius: var(--radius-xl);
            background: rgba(255, 251, 245, 0.96);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(121, 86, 54, 0.15);
            box-shadow: var(--shadow);
            padding: 48px 40px 40px;
            display: grid;
            gap: 32px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #d56a37, #f1bb73, #d56a37);
        }

        .brand {
            display: grid;
            gap: 12px;
            text-align: center;
        }

        .brand-mark {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(145deg, #d56a37, #8f4323);
            color: #fff8ef;
            display: grid;
            place-items: center;
            font-size: 28px;
            margin: 0 auto;
            box-shadow: 0 18px 24px rgba(170, 89, 44, 0.24);
        }

        .brand h1 {
            font: 700 24px/1.2 var(--font-display);
            color: var(--text);
        }

        .brand p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .login-form {
            display: grid;
            gap: 20px;
        }

        .form-row {
            display: grid;
            gap: 8px;
        }

        .form-row label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .form-row input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(109, 79, 54, 0.18);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            font-size: 15px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-row input:focus {
            outline: none;
            border-color: rgba(199, 99, 47, 0.42);
            box-shadow: 0 0 0 4px rgba(199, 99, 47, 0.08);
        }

        .form-row input::placeholder {
            color: #b5a79a;
        }

        .btn {
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 24px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(145deg, #d56a37, #8f4323);
            color: #fffaf4;
        }

        .btn-primary:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(170, 89, 44, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            text-align: center;
            display: none;
            line-height: 1.5;
        }

        .status.error {
            display: block;
            background: rgba(194, 70, 53, 0.12);
            color: #8d3023;
            border: 1px solid rgba(194, 70, 53, 0.18);
        }

        .status.success {
            display: block;
            background: rgba(45, 122, 88, 0.12);
            color: #1b5a3e;
            border: 1px solid rgba(45, 122, 88, 0.18);
        }

        .footer {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-loading {
            pointer-events: none;
        }

        @media (max-width: 520px) {
            .login-card {
                padding: 32px 24px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="brand-mark">⚔️</div>
            <h1>洛克王国 PVP</h1>
            <p>请输入管理账号密码登录后台</p>
        </div>

        <form class="login-form" id="loginForm" autocomplete="on">
            <div class="form-row">
                <label for="usernameInput">账号</label>
                <input
                    type="text"
                    id="usernameInput"
                    name="username"
                    placeholder="输入管理账号"
                    autocomplete="username"
                    required
                    autofocus
                >
            </div>
            <div class="form-row">
                <label for="passwordInput">密码</label>
                <input
                    type="password"
                    id="passwordInput"
                    name="password"
                    placeholder="输入管理密码"
                    autocomplete="current-password"
                    required
                >
            </div>

            <div class="status" id="loginStatus"></div>

            <button class="btn btn-primary" type="submit" id="loginBtn">
                登 录
            </button>
        </form>

        <div class="footer">
            <p>仅限授权管理员使用 · 洛克王国 PVP 直播管理后台</p>
        </div>
    </div>

    <script>
        (function () {
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('usernameInput');
            const passwordInput = document.getElementById('passwordInput');
            const loginBtn = document.getElementById('loginBtn');
            const status = document.getElementById('loginStatus');

            // Check if already logged in
            fetch('/api/auth/check')
                .then(r => {
                    if (r.ok) window.location.href = '/admin.html';
                })
                .catch(() => {});

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                status.className = 'status';
                status.textContent = '';
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner"></span>登录中...';

                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: usernameInput.value.trim(),
                            password: passwordInput.value,
                        }),
                    });

                    const data = await res.json();

                    if (data.success) {
                        status.className = 'status success';
                        status.textContent = '登录成功，正在跳转...';
                        setTimeout(() => {
                            window.location.href = '/admin.html';
                        }, 400);
                    } else {
                        status.className = 'status error';
                        status.textContent = data.error || '登录失败，请检查账号密码';
                        loginBtn.disabled = false;
                        loginBtn.textContent = '登 录';
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                } catch (err) {
                    status.className = 'status error';
                    status.textContent = '网络错误，无法连接到服务器';
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登 录';
                }
            });
        })();
    </script>
</body>
</html>
