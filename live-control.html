<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国PVP - 实时控制</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #334155 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 24px;
        }
        .wrap { max-width: 1800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 18px; }
        .hint {
            text-align: center;
            margin-bottom: 18px;
            color: #cbd5e1;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .status {
            background: rgba(255,255,255,0.08);
            padding: 10px 14px;
            border-radius: 12px;
            min-height: 40px;
        }
        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            font-weight: 700;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .panel {
            background: rgba(15, 23, 42, 0.86);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 18px 40px rgba(2, 6, 23, 0.32);
        }
        .panel-left {
            border-color: rgba(248, 113, 113, 0.28);
        }
        .panel-right {
            border-color: rgba(96, 165, 250, 0.28);
        }
        .panel h2 {
            margin-bottom: 12px;
            color: #e2e8f0;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .slot-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 16px;
            padding: 12px;
            display: grid;
            grid-template-columns: 106px minmax(0, 1fr);
            gap: 12px;
            align-items: start;
        }
        .slot-card-right {
            grid-template-columns: minmax(0, 1fr) 106px;
        }
        .slot-card-right .slot-main {
            order: 1;
        }
        .slot-card-right .slot-preview-wrap {
            order: 2;
        }
        .sprite-preview {
            width: 106px;
            height: 106px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(15, 23, 42, 0.72);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .sprite-preview img {
            width: 76px;
            height: 76px;
            object-fit: contain;
            display: block;
        }
        .sprite-empty {
            color: #64748b;
            font-size: 12px;
        }
        .sprite-label {
            width: 106px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
            font-size: 13px;
            line-height: 1.3;
            text-align: center;
        }
        .slot-index {
            color: #f8fafc;
            font-weight: 700;
            flex: 0 0 auto;
        }
        .slot-main {
            display: grid;
            gap: 10px;
            min-width: 0;
        }
        .slot-name { color: #93c5fd; }
        .form-row { display: grid; gap: 6px; }
        .form-row label { font-size: 12px; color: #cbd5e1; }
        .form-row input[type="range"] { width: 100%; }
        .health-range { accent-color: #22c55e; }
        .energy-range { accent-color: #F2CB51; }
        .form-row input[type="number"] {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            padding: 8px 10px;
        }
        .line {
            display: grid;
            grid-template-columns: 1fr 82px;
            gap: 10px;
            align-items: center;
        }
        .mini {
            font-size: 12px;
            color: #94a3b8;
        }
        @media (max-width: 1100px) {
            .panels { grid-template-columns: 1fr; }
        }
        @media (max-width: 720px) {
            .slot-card {
                grid-template-columns: 1fr;
            }
            .sprite-preview {
                width: 106px;
                height: 106px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>实时控制页</h1>
        <div class="hint">这里会自动保存血量和能力值，也可以手动保存。无需选中槽位，左右两侧 6 个精灵会同时展开显示。</div>
        <div class="topbar">
            <div class="status" id="status">加载中...</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-secondary" id="reloadBtn">重新加载</button>
                <button class="btn btn-primary" id="saveBtn">手动保存</button>
            </div>
        </div>
        <div class="panels">
            <div class="panel panel-left">
                <h2>左侧</h2>
                <div class="grid" id="leftGrid"></div>
            </div>
            <div class="panel panel-right">
                <h2>右侧</h2>
                <div class="grid" id="rightGrid"></div>
            </div>
        </div>
    </div>

</div>

    <script src="/live-control-core.js"></script>
    <script>
        LiveControl.init({
            statusElementId: 'status',
            leftGridId: 'leftGrid',
            rightGridId: 'rightGrid',
            saveBtnId: 'saveBtn',
            reloadBtnId: 'reloadBtn',
            autoRefresh: true,
            autoRefreshInterval: 1500,
            autoSaveDelay: 800
        });
    </script>
</body>
</html>
