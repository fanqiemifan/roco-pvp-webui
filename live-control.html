<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国PVP - 实时控制</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #334155 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 16px;
        }
        .wrap { max-width: 1560px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            line-height: 1.15;
        }
        .hint {
            text-align: center;
            margin-bottom: 14px;
            color: #cbd5e1;
            font-size: 14px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .status {
            background: rgba(255,255,255,0.08);
            padding: 9px 12px;
            border-radius: 12px;
            min-height: 38px;
        }
        .btn {
            border: none;
            border-radius: 10px;
            padding: 9px 14px;
            cursor: pointer;
            font-weight: 700;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-accent { background: #10b981; color: #052e1b; }
        .btn-warning { background: #f59e0b; color: #451a03; }
        .btn-danger { background: #ef4444; color: #fff; }
        .file-status {
            flex-basis: 100%;
            color: #93c5fd;
            font-size: 12px;
            min-height: 16px;
        }
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .panel {
            background: rgba(15, 23, 42, 0.86);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 18px;
            padding: 14px;
            box-shadow: 0 18px 40px rgba(2, 6, 23, 0.32);
        }
        .panel-left {
            border-color: rgba(248, 113, 113, 0.28);
        }
        .panel-right {
            border-color: rgba(96, 165, 250, 0.28);
        }
        .panel h2 {
            margin-bottom: 10px;
            color: #e2e8f0;
            font-size: 18px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }
        .slot-card {
            position: relative;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
                linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(30, 41, 59, 0.88));
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 14px;
            padding: 6px 8px;
            display: grid;
            grid-template-columns: 56px minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            height: 78px;
            overflow: hidden;
        }

        .slot-card-right .slot-main {
            text-align: left;
        }
        .sprite-preview {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.72);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .sprite-preview img {
            width: 52px;
            height: 52px;
            object-fit: contain;
            display: block;
        }
        .sprite-empty {
            color: #64748b;
            font-size: 10px;
            text-align: center;
            line-height: 1.2;
        }
        .slot-preview-wrap {
            display: grid;
            justify-items: center;
            align-content: start;
            gap: 3px;
            position: relative;
        }
        .slot-index {
            position: absolute;
            left: -2px;
            top: -2px;
            width: 16px;
            height: 16px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(248, 250, 252, 0.18);
            color: #f8fafc;
            font-weight: 700;
            font-size: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(2, 6, 23, 0.3);
        }
        .slot-main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            min-width: 0;
            justify-items: center;
            align-self: center;
            height: 100%;
            width: 100%;
        }
        .slot-head {
            display: none;
        }
        .slot-name {
            color: #f8fafc;
            width: 100%;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            text-align: center;
        }
        .form-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .range-line {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 34px;
            align-items: center;
            gap: 4px;
            width: 100%;
        }
        .range-shell {
            --percent: 100%;
            --accent: #22c55e;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 14px;
        }
        .range-shell-energy {
            --accent: #f2cb51;
        }
        .range-shell input[type="range"] {
            position: relative;
            z-index: 1;
            -webkit-appearance: none;
            appearance: none;
            display: block;
            width: 100%;
            margin: 0 auto;
            height: 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.26);
            background:
                linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--percent), rgba(15, 23, 42, 0.94) var(--percent), rgba(15, 23, 42, 0.94) 100%);
            outline: none;
            cursor: pointer;
            box-shadow: inset 0 1px 3px rgba(2, 6, 23, 0.35);
        }
        .range-shell input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(248, 250, 252, 0.95);
            background: #fff;
            box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.28);
        }
        .range-shell input[type="range"]::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(248, 250, 252, 0.95);
            background: #fff;
            box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.28);
        }
        .range-shell input[type="range"]::-moz-range-track {
            height: 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.26);
            background: transparent;
        }
        .value-input {
            width: 34px;
            height: 16px;
            border-radius: 5px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: rgba(15, 23, 42, 0.96);
            color: #f8fafc;
            font-size: 9px;
            font-weight: 700;
            line-height: 1;
            text-align: center;
            padding: 0 2px;
        }
        .value-input:focus {
            outline: none;
            border-color: rgba(148, 197, 253, 0.65);
        }
        .value-input::-webkit-outer-spin-button,
        .value-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .value-input[type="number"] {
            appearance: textfield;
        }
        @media (max-width: 1500px) {
            .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 1100px) {
            .panels { grid-template-columns: 1fr; }
        }
        @media (max-width: 720px) {
            .grid { grid-template-columns: 1fr; }
            .slot-card {
                grid-template-columns: 1fr;
                height: auto;
            }
            .sprite-preview {
                width: 72px;
                height: 72px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>实时控制页</h1>
        <div class="hint">自动保存血量和能力值，左右两侧均为两行三列紧凑布局，滑动条上直接显示当前数值。</div>
        <div class="topbar">
            <div class="status" id="status">加载中...</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-secondary" id="reloadBtn">重新加载</button>
                <button class="btn btn-accent" id="exportConfigBtn">配置导出</button>
                <button class="btn btn-warning" id="liveListenBtn">实时监听</button>
                <button class="btn btn-primary" id="saveBtn">手动保存</button>
                <div class="file-status" id="liveFileStatus"></div>
            </div>
        </div>
        <div class="panels">
            <div class="panel panel-left">
                <h2>左侧</h2>
                <div class="grid" id="leftGrid"></div>
            </div>
            <div class="panel panel-right">
                <h2>右侧</h2>
                <div class="grid" id="rightGrid"></div>
            </div>
        </div>
    </div>

    <script src="vendor/socket.io.min.js"></script>
    <script src="frontend/js/live-control-core.js"></script>
    <script>
        LiveControl.init({
            statusElementId: 'status',
            leftGridId: 'leftGrid',
            rightGridId: 'rightGrid',
            saveBtnId: 'saveBtn',
            reloadBtnId: 'reloadBtn',
            exportConfigBtnId: 'exportConfigBtn',
            liveListenBtnId: 'liveListenBtn',
            liveFileStatusId: 'liveFileStatus',
            autoRefresh: true,
            autoRefreshInterval: 1500,
            autoSaveDelay: 800
        });
    </script>
</body>
</html>
